<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit - TOP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">

<h2>Deposit Funds</h2>
<div class="payment-box">

<h3>Bank Transfer</h3>

<p><strong>Bank:</strong> Opay</p>

<p><strong>Account Name:</strong> TOP Investment</p>

<p><strong>Account Number:</strong> 8123456789</p>

<hr>

<h3>USDT (TRC20)</h3>

<p id="walletAddress">
TQExampleWalletAddress123456789
</p>

</div>
<label>Amount (₦)</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Payment Method</label>
<select id="method">
    <option>Bank Transfer</option>
    <option>USDT (TRC20)</option>
</select>

<button id="depositBtn">Submit Deposit</button>
<p id="status"></p>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="deposit.js"></script>

</body>
</html>
